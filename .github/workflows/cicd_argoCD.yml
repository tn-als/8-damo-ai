name: CI/CD Pipeline (ArgoCD)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPO_PROD: prod/ai
  AWS_REGION: ap-northeast-2
  INFRA_REPO: 100-hours-a-week/8-damo-cloud
  HELM_VALUES_PATH: k8s/ai/helm/values.yaml

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Gateway Tests
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
          AWS_ENDPOINT_URL: "dummy"
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_BUCKET_NAME: "dev-damo-s3"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          LANGSMITH_API_KEY: "dummy"
          OPENROUTER_API_KEY: "dummy"
          OPENROUTER_MODEL: "dummy"
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_API_URL: ${{ secrets.RUNPOD_API_URL }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -m pytest test/gateway/test_gateway.py

  build_and_push:
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve environment
        id: meta
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "ECR_REPO=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_PROD }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update_helm:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          ref: main

      - name: Update image tag in values.yaml
        run: |
          IMAGE_TAG=${{ needs.build_and_push.outputs.image_tag }}
          sed -i "s/^  tag: .*/  tag: ${IMAGE_TAG}/" ${{ env.HELM_VALUES_PATH }}

      - name: Commit and push
        run: |
          git config user.email "kusumin38@gmail.com"
          git config user.name "tn-als"
          git add ${{ env.HELM_VALUES_PATH }}
          git commit -m "ci: update ai image tag to ${{ needs.build_and_push.outputs.image_tag }}"
          git push

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [ci, build_and_push, update_helm]
    if: always() && github.event_name == 'push'
    steps:
      - name: Send notification
        run: |
          CI_RESULT="${{ needs.ci.result }}"
          BUILD_RESULT="${{ needs.build_and_push.result }}"
          HELM_RESULT="${{ needs.update_helm.result }}"

          REF="${{ github.repository }}@${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"username\":\"AI CI/CD\",\"content\":\"🖥️ AI CI/CD 결과 (ArgoCD)\\n- CI: **${CI_RESULT}**\\n- Build & Push: **${BUILD_RESULT}**\\n- Helm Update: **${HELM_RESULT}**\\n🔗 [${REF}](${RUN_URL})\"}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
