name: AI Rollback (manual)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Rollback target environment"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - dev

      reason:
        description: "Rollback reason"
        required: false
        default: "manual rollback"

env:
  REMOTE_DIR: /home/ubuntu/opt/ai-prod
  ROLLBACK_SCRIPT: app/scripts/rollback.sh

  AWS_REGION: ap-northeast-2
  DEPLOY_BUCKET: ${{ secrets.DEPLOY_BUCKET }}
  S3_KEY_PREFIX: ${{ secrets.S3_KEY_PREFIX}}
  CODEDEPLOY_APP: damo-ai
  CODEDEPLOY_GROUP_PROD: damo-ai-prod
  CODEDEPLOY_GROUP_DEV: damo-ai-dev


jobs:
  rollback:
    name: Rollback
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.DEPLOY_ROLE_ARN }}

      - name: Package rollback bundle
        run: |
          set -euo pipefail
          zip -r rollback-bundle.zip appspec.yml scripts/rollback.sh

      - name: Upload to S3
        run: |
          set -euo pipefail
          KEY="${{ env.S3_KEY_PREFIX }}/${{ github.run_id }}.zip"
          aws s3 cp rollback-bundle.zip "s3://${{ env.S3_BUCKET }}/${KEY}"
          echo "S3_KEY=${KEY}" >> $GITHUB_ENV

      - name: Create CodeDeploy deployment
        run: |
          set -euo pipefail

          if [ "${{ github.event.inputs.target }}" = "prod" ]; then
            GROUP="${{ env.CODEDEPLOY_GROUP_PROD }}"
          else
            GROUP="${{ env.CODEDEPLOY_GROUP_DEV }}"
          fi

          aws deploy create-deployment \
            --application-name "${{ env.CODEDEPLOY_APP }}" \
            --deployment-group-name "${GROUP}" \
            --s3-location bucket=${{ env.S3_BUCKET }},key=${{ env.S3_KEY }},bundleType=zip \
            --description "AI rollback: ${{ github.event.inputs.reason }} (run ${{ github.run_id }})" \
            --file-exists-behavior OVERWRITE


  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [rollback]
    if: always()

    steps:
      - name: Send notification
        run: |
          RESULT="${{ needs.rollback.result }}"
          REF="${{ github.repository }}@${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REASON="${{ github.event.inputs.reason }}"

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"username\":\"AI Rollback\",\"content\":\"AI Rollback 실행 결과\\n- Rollback: **${RESULT}**\\n- Reason: ${REASON}\\n🔗 [${REF}](${RUN_URL})\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}