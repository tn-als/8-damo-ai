name: Gateway Build and Push

on:
  push:
    branches:
      - dev
      - feature/v2/gateway
    paths:
      - 'gateway/**'
      - 'shared/**'
      - 'requirements.txt'
      - '.github/workflows/gateway-deploy.yml'

jobs:
  # 1. 테스트 단계: 코드가 안전한지 먼저 검증 (도커 빌드 전 실행)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Gateway Tests
        run: |
          # PYTHONPATH 설정 후 게이트웨이 전용 테스트 실행
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -m pytest test/gateway/test_gateway.py

  # 2. 빌드 및 배포 단계: 테스트가 성공했을 때만 실행
  build-and-push:
    needs: test # <--- 테스트 잡이 성공해야만 이 잡이 시작됨
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 자동 버저닝 (Local Repo에 Tag 생성)
      - name: Bump version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.67.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      # GHCR 로그인 (위에서 가신 것처럼 다른 Org 권한이 있는 PAT 사용)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: james0103
          password: ${{ secrets.GHCR_PAT }}

      # Docker 메타데이터 설정 (대상 Organization 지정)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # <TARGET_ORG_NAME>을 실제 목표 Org 이름으로 변경해 주세요!
          images: ghcr.io/james0103/damo-gateway
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag_version.outputs.new_tag }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
