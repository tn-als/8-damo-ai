name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  USER: ${{ secrets.AI_SERVER_USER }}
  PORT: ${{ secrets.AI_SERVER_PORT }}
  KEY: ${{ secrets.AI_SERVER_KEY }}
  HOST: ${{ github.ref == 'refs/heads/main' && secrets.AI_PROD_SERVER_HOST || secrets.AI_DEV_SERVER_HOST }}

  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPO_DEV: dev/ai
  ECR_REPO_PROD: prod/ai

  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ap-northeast-2

  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  DB_NAME: ${{ secrets.DB_NAME }}

  # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  # LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
  # LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
  # LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}

  DEPLOYMENT_APP: damo-ai
  DEPLOYMENT_GROUP_DEV: dev-damo-ai
  DEPLOYMENT_GROUP_PROD: prod-damo-ai

  # GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
  AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
  # AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
  # LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
  # OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  # OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
  # KAFKA_BOOTSTRAP_SERVERS: ${{ github.ref == 'refs/heads/main' && secrets.KAFKA_BOOTSTRAP_SERVERS_PROD || secrets.KAFKA_BOOTSTRAP_SERVERS_DEV }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Gateway Tests
        env:
            GOOGLE_API_KEY: ${{env.GOOGLE_API_KEY}}
            OPENAI_API_KEY: ${{env.OPENAI_API_KEY}}ㅣ
            MONGODB_URI: ${{ env.MONGODB_URI}}
            LANGFUSE_SECRET_KEY: ${{env.LANGFUSE_SECRET_KEY}}
            LANGFUSE_PUBLIC_KEY: ${{env.LANGFUSE_PUBLIC_KEY}}
            LANGFUSE_BASE_URL: ${{env.LANGFUSE_BASE_URL}}
            AWS_ENDPOINT_URL: ${{env.AWS_ENDPOINT_URL}}
            AWS_REGION: ${{env.AWS_REGION}}
            AWS_BUCKET_NAME: ${{env.AWS_BUCKET_NAME}}
            AWS_ACCESS_KEY_ID: ${{env.AWS_ACCESS_KEY_ID}}
            AWS_SECRET: ${{env.AWS_SECRET_ACCESS_KEY}}
            LANGSMITH_API_KEY: ${{env.LANGSMITH_API_KEY}}
            OPENROUTER_API_KEY: ${{env.OPENROUTER_API_KEY}}
            OPENROUTER_MODEL: ${{env.OPENROUTER_MODEL}}
            KAFKA_BOOTSTRAP_SERVERS: ${{env.KAFKA_BOOTSTRAP_SERVERS}}
        run: |
            export PYTHONPATH=$PYTHONPATH:$(pwd)
            python -m pytest test/gateway/test_gateway.py

  build_and_push:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve environment
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            ECR_REPO="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_PROD }}"
          else
            ECR_REPO="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_DEV }}"
          fi
          echo "ECR_REPO=${ECR_REPO}" >> "$GITHUB_ENV"
          echo "IMAGE=${ECR_REPO}:${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_dev:
    name: CD (SSH Deploy - Dev)
    needs: build_and_push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == 'dev'

    steps:
      - name: Setup WireGuard
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard
          echo "${{ secrets.WG_CONF }}" | sed '/^DNS/d' | sudo tee /etc/wireguard/wg0.conf
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sudo ip route add ${{ env.HOST }}/32 dev wg0
          for i in {1..15}; do
            ping -c 1 10.10.0.1 > /dev/null 2>&1 || true
            if sudo wg show wg0 | grep -q "latest handshake"; then
              echo "VPN handshake OK (attempt $i)"
              break
            fi
            echo "Attempt $i: not connected yet, retrying..."
            sleep 2
          done
          sleep 3
          for i in {1..10}; do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -o BatchMode=yes \
              -p ${{ env.PORT }} -i /dev/null \
              ${{ env.USER }}@${{ env.HOST }} exit 2>/dev/null; then
              break
            fi
            if ping -c 1 -W 2 ${{ env.HOST }} > /dev/null 2>&1; then
              echo "AI server reachable (attempt $i)"
              break
            fi
            echo "Waiting for AI server route... (attempt $i)"
            sleep 2
          done

      - name: Deploy via SSH (pull ECR image and run docker-compose)
        run: |
          echo "${{ env.KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -p ${{ env.PORT }} \
            ${{ env.USER }}@${{ env.HOST }} \
            "set -euo pipefail && aws ecr get-login-password --region ap-northeast-2 | sudo docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }} && cd /home/ubuntu && sudo docker compose pull gateway && sudo docker compose up -d gateway"
          rm -f /tmp/deploy_key

      - name: Teardown WireGuard
        if: always()
        run: sudo wg-quick down wg0 || true

  deploy_prod:
    name: CD (CodeDeploy - Prod)
    needs: build_and_push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == 'main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve deployment target
        run: |
          echo "APPLICATION_NAME=${DEPLOYMENT_APP}" >> "$GITHUB_ENV"
          echo "DEPLOYMENT_GROUP=${DEPLOYMENT_GROUP_PROD}" >> "$GITHUB_ENV"
          echo "ECR_REPO=${ECR_REGISTRY}/${ECR_REPO_PROD}" >> "$GITHUB_ENV"
          echo "ECR_REGISTRY=${ECR_REGISTRY}" >> "$GITHUB_ENV"
          SHORT_SHA=${GITHUB_SHA::7}
          echo "IMAGE_TAG=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE=${ECR_REPO}:${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Prepare revision bundle (appspec/scripts + image info)
        run: |
          mkdir -p scripts
          cat > scripts/image.env <<EOF
          IMAGE=${IMAGE}
          IMAGE_TAG=${IMAGE_TAG}
          ECR_REPO=${ECR_REPO}
          ECR_REGISTRY=${ECR_REGISTRY}
          EOF

          cat > scripts/before_install.sh <<'SCRIPTEOF'
          #!/bin/bash
          set -e

          echo "BeforeInstall: Creating .env file..."
          cat > /home/ubuntu/app/.env << 'ENVEOF'
          GOOGLE_API_KEY=__GOOGLE_API_KEY__
          MONGODB_URI=__MONGODB_URI__
          GEMINI_MODEL=__GEMINI_MODEL__
          OPENAI_API_KEY=__OPENAI_API_KEY__
          LANGFUSE_SECRET_KEY=__LANGFUSE_SECRET_KEY__
          LANGFUSE_PUBLIC_KEY=__LANGFUSE_PUBLIC_KEY__
          LANGFUSE_BASE_URL=__LANGFUSE_BASE_URL__
          AWS_ENDPOINT_URL=__AWS_ENDPOINT_URL__
          AWS_REGION=__AWS_REGION__
          AWS_BUCKET_NAME=__AWS_BUCKET_NAME__
          AWS_ACCESS_KEY_ID=__AWS_ACCESS_KEY_ID__
          AWS_SECRET_ACCESS_KEY=__AWS_SECRET_ACCESS_KEY__
          LANGSMITH_API_KEY=__LANGSMITH_API_KEY__
          OPENROUTER_API_KEY=__OPENROUTER_API_KEY__
          OPENROUTER_MODEL=__OPENROUTER_MODEL__
          KAFKA_BOOTSTRAP_SERVERS=__KAFKA_BOOTSTRAP_SERVERS__
          ENVEOF
          chmod 600 /home/ubuntu/app/.env
          echo "BeforeInstall: .env file created"

          echo "BeforeInstall: Stopping existing containers..."
          if [ -d "/home/ubuntu/app" ]; then
              cd /home/ubuntu/app
              sudo docker compose down || true
              sudo docker system prune -f || true

              echo "BeforeInstall: Creating backup of current app..."
              if [ -d "/home/ubuntu/app_backup" ]; then
                  sudo rm -rf /home/ubuntu/app_backup
              fi
              sudo cp -r /home/ubuntu/app /home/ubuntu/app_backup
          else
              echo "BeforeInstall: No existing app found, skipping..."
          fi
          SCRIPTEOF

          sed -i 's|__GOOGLE_API_KEY__|${{ secrets.GOOGLE_API_KEY }}|g' scripts/before_install.sh
          sed -i 's|__MONGODB_URI__|${{ secrets.MONGODB_URI }}|g' scripts/before_install.sh
          sed -i 's|__GEMINI_MODEL__|${{ secrets.GEMINI_MODEL }}|g' scripts/before_install.sh
          sed -i 's|__OPENAI_API_KEY__|${{ secrets.OPENAI_API_KEY }}|g' scripts/before_install.sh
          sed -i 's|__LANGFUSE_SECRET_KEY__|${{ secrets.LANGFUSE_SECRET_KEY }}|g' scripts/before_install.sh
          sed -i 's|__LANGFUSE_PUBLIC_KEY__|${{ secrets.LANGFUSE_PUBLIC_KEY }}|g' scripts/before_install.sh
          sed -i 's|__LANGFUSE_BASE_URL__|${{ secrets.LANGFUSE_BASE_URL }}|g' scripts/before_install.sh
          sed -i 's|__AWS_ENDPOINT_URL__|${{ secrets.AWS_ENDPOINT_URL }}|g' scripts/before_install.sh
          sed -i 's|__AWS_REGION__|ap-northeast-2|g' scripts/before_install.sh
          sed -i 's|__AWS_BUCKET_NAME__|${{ secrets.AWS_BUCKET_NAME }}|g' scripts/before_install.sh
          sed -i 's|__AWS_ACCESS_KEY_ID__|${{ secrets.AWS_ACCESS_KEY_ID }}|g' scripts/before_install.sh
          sed -i 's|__AWS_SECRET_ACCESS_KEY__|${{ secrets.AWS_SECRET_ACCESS_KEY }}|g' scripts/before_install.sh
          sed -i 's|__LANGSMITH_API_KEY__|${{ secrets.LANGSMITH_API_KEY }}|g' scripts/before_install.sh
          sed -i 's|__OPENROUTER_API_KEY__|${{ secrets.OPENROUTER_API_KEY }}|g' scripts/before_install.sh
          sed -i 's|__OPENROUTER_MODEL__|${{ secrets.OPENROUTER_MODEL }}|g' scripts/before_install.sh
          sed -i 's|__KAFKA_BOOTSTRAP_SERVERS__|${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}|g' scripts/before_install.sh
          chmod +x scripts/before_install.sh

          zip -r deployment.zip appspec.yml scripts/ docker-compose.yml

      - name: Upload bundle to S3
        run: |
          S3_BUCKET="${{ secrets.CODEDEPLOY_BUCKET }}"
          S3_KEY="codedeploy/prod/ai/${GITHUB_SHA::7}.zip"
          aws s3 cp deployment.zip "s3://${S3_BUCKET}/${S3_KEY}"
          echo "S3_BUCKET=${S3_BUCKET}" >> $GITHUB_ENV
          echo "S3_KEY=${S3_KEY}" >> $GITHUB_ENV

      - name: Create CodeDeploy deployment (from S3)
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "${APPLICATION_NAME}" \
            --deployment-group-name "${DEPLOYMENT_GROUP}" \
            --deployment-config-name CodeDeployDefault.AllAtOnce \
            --s3-location bucket="${S3_BUCKET}",key="${S3_KEY}",bundleType=zip \
            --file-exists-behavior OVERWRITE \
            --ignore-application-stop-failures \
            --query deploymentId \
            --output text)
          echo "DEPLOYMENT_ID=${DEPLOYMENT_ID}" >> "$GITHUB_ENV"
          echo "Created deployment: ${DEPLOYMENT_ID}"

      - name: Wait for deployment complete
        run: |
          DEPLOYMENT_ID=${{ env.DEPLOYMENT_ID }}
          echo "Waiting for deployment ${DEPLOYMENT_ID} to complete..."

          while true; do
            STATUS=$(aws deploy get-deployment \
              --deployment-id "${DEPLOYMENT_ID}" \
              --query 'deploymentInfo.status' \
              --output text)
            
            EVENT=$(aws deploy get-deployment \
              --deployment-id "${DEPLOYMENT_ID}" \
              --query 'deploymentInfo.lifecycleEvents[0].name' \
              --output text)
            
            EVENT_STATUS=$(aws deploy get-deployment \
              --deployment-id "${DEPLOYMENT_ID}" \
              --query 'deploymentInfo.lifecycleEvents[0].status' \
              --output text)
            
            echo "$(date '+%Y-%m-%d %H:%M:%S') - Status: ${STATUS}, Event: ${EVENT} (${EVENT_STATUS})"
            
            case "${STATUS}" in
              Succeeded)
                echo "Deployment succeeded!"
                exit 0
                ;;
              Failed|Stopped)
                echo "Deployment ${STATUS}"
                exit 1
                ;;
              *)
                sleep 10
                ;;
            esac
          done

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [ci, build_and_push, deploy_dev, deploy_prod]
    if: always() && github.event_name == 'push'

    steps:
      - name: Send notification
        run: |
          CI_RESULT="${{ needs.ci.result }}"
          DEV_DEPLOY_RESULT="${{ needs.deploy_dev.result }}"
          PROD_DEPLOY_RESULT="${{ needs.deploy_prod.result }}"
          
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            DEPLOY_RESULT="${PROD_DEPLOY_RESULT}"
          else
            DEPLOY_RESULT="${DEV_DEPLOY_RESULT}"
          fi
          
          REF="${{ github.repository }}@${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -H "Content-Type: application/json" \
                -X POST \
              -d "{\"username\":\"AI CI/CD\",\"content\":\"🖥️ AI CI/CD 결과\\n- CI: **${CI_RESULT}**\\n- Deploy: **${DEPLOY_RESULT}**\\n🔗 [${REF}](${RUN_URL})\"}" \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
