name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

env:
  HOST: ${{ secrets.AI_PROD_SERVER_HOST }}
  USER: ${{ secrets.AI_PROD_SERVER_USER }}
  PORT: ${{ secrets.AI_PROD_SERVER_PORT }}
  KEY: ${{ secrets.AI_PROD_SERVER_KEY }}

  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPO_DEV: dev/ai
  ECR_REPO_PROD: prod/ai

  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  DB_NAME: ${{ secrets.DB_NAME }}

  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
  LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
  LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}

jobs:
  # 1. 테스트 단계: 코드가 안전한지 먼저 검증 (도커 빌드 전 실행)
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Gateway Tests
        env:
            GOOGLE_API_KEY: ${{env.GOOGLE_API_KEY}}
            OPENAI_API_KEY: ${{env.OPENAI_API_KEY}}ㅣ
            MONGODB_URI: ${{ env.MONGODB_URI}}
            LANGFUSE_SECRET_KEY: ${{env.LANGFUSE_SECRET_KEY}}
            LANGFUSE_PUBLIC_KEY: ${{env.LANGFUSE_PUBLIC_KEY}}
            LANGFUSE_BASE_URL: ${{env.LANGFUSE_BASE_URL}}
            AWS_ENDPOINT_URL: "dummy"
            AWS_REGION: ${{env.AWS_REGION}}
            AWS_BUCKET_NAME: "dev-damo-s3"
            AWS_ACCESS_KEY_ID: ${{env.AWS_ACCESS_KEY_ID}}
            AWS_SECRET: ${{env.AWS_SECRET_ACCESS_KEY}}
            LANGSMITH_API_KEY: "dummy"
            OPENROUTER_API_KEY: "dummy"
            OPENROUTER_MODEL: "dummy"
            KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
        run: |
            # PYTHONPATH 설정 후 게이트웨이 전용 테스트 실행
            export PYTHONPATH=$PYTHONPATH:$(pwd)
            python -m pytest test/gateway/test_gateway.py

  # 2. 빌드 및 배포 단계: 테스트가 성공했을 때만 실행
  build_and_push:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve environment
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            ECR_REPO="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_PROD }}"
          else
            ECR_REPO="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_DEV }}"
          fi
          echo "IMAGE=${ECR_REPO}:${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "LATEST_IMAGE=${ECR_REPO}:latest" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE }}
            ${{ env.LATEST_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: CD (Docker deploy)
    needs: build_and_push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Setup WireGuard
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard
          echo "=== Runner IP before VPN ==="
          ip addr show | grep "inet "
          echo "=== Routes before VPN ==="
          ip route show
          echo "${{ secrets.WG_CONF }}" | sed '/^DNS/d' | sudo tee /etc/wireguard/wg0.conf
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sudo ip route add ${{ env.HOST }}/32 dev wg0
          echo "=== Routes after VPN ==="
          ip route show
          echo "Waiting for WireGuard handshake..."
          for i in {1..15}; do
            ping -c 1 10.10.0.1 > /dev/null 2>&1 || true
            if sudo wg show wg0 | grep -q "latest handshake"; then
              echo "VPN connected (attempt $i)"
              break
              ]
            fi
            echo "Attempt $i: not connected yet, retrying..."
            sleep 2
          done
          sudo wg show

      - name: Test connectivity to AI instance
        run: |
          nc -zv ${{ env.HOST }} ${{ env.PORT }} -w 10 && echo "PORT OPEN" || echo "PORT CLOSED/TIMEOUT"

      - name: Deploy via SSH (pull ECR image and run docker-compose)
        run: |
          echo "${{ secrets.AI_PROD_SERVER_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -p ${{ env.PORT }} \
            ${{ env.USER }}@${{ env.HOST }} \
            "set -euo pipefail && aws ecr get-login-password --region ap-northeast-2 | sudo docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }} && cd /home/ubuntu && sudo docker compose pull gateway && sudo docker compose up -d gateway"
          rm -f /tmp/deploy_key

      - name: Teardown WireGuard
        if: always()
        run: sudo wg-quick down wg0 || true


  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [ci, deploy]
    if: always() && github.event_name == 'push'

    steps:
      - name: Send notification
        run: |
          CI_RESULT="${{ needs.ci.result }}"
          DEPLOY_RESULT="${{ needs.deploy.result }}"
          REF="${{ github.repository }}@${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -H "Content-Type: application/json" \
                -X POST \
              -d "{\"username\":\"AI CI/CD\",\"content\":\"🖥️ AI CI/CD 결과\\n- CI: **${CI_RESULT}**\\n- Deploy: **${DEPLOY_RESULT}**\\n🔗 [${REF}](${RUN_URL})\"}" \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
